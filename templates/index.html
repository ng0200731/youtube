<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Top Videos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>YouTube Top Videos</h1>
        <p class="subtitle">Find the most viewed videos in any time period</p>
    </header>

    <main>
        <section class="search-section">
            <form id="searchForm" onsubmit="return false;">
                <div class="form-row">
                    <div class="form-group" style="flex:1">
                        <label for="query">Search (optional)</label>
                        <input type="text" id="query" placeholder="e.g. music, gaming, news...">
                    </div>
                    <div class="form-group">
                        <label for="titleLang">Title Language</label>
                        <select id="titleLang">
                            <option value="">Any</option>
                            <option value="en">English</option>
                            <option value="zh-TW">中文 繁體</option>
                            <option value="zh-CN">中文 简体</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="es">Español</option>
                            <option value="pt">Português</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="hi">हिन्दी</option>
                            <option value="ar">العربية</option>
                            <option value="th">ไทย</option>
                            <option value="vi">Tiếng Việt</option>
                            <option value="id">Bahasa Indonesia</option>
                            <option value="ru">Русский</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="audioLang">Audio Language</label>
                        <select id="audioLang">
                            <option value="">Any</option>
                            <option value="english">English</option>
                            <option value="mandarin">Mandarin 普通话</option>
                            <option value="cantonese">Cantonese 廣東話</option>
                            <option value="japanese">Japanese 日本語</option>
                            <option value="korean">Korean 한국어</option>
                            <option value="spanish">Spanish</option>
                            <option value="portuguese">Portuguese</option>
                            <option value="french">French</option>
                            <option value="german">German</option>
                            <option value="hindi">Hindi</option>
                            <option value="arabic">Arabic</option>
                            <option value="thai">Thai</option>
                            <option value="vietnamese">Vietnamese</option>
                            <option value="indonesian">Indonesian</option>
                            <option value="russian">Russian</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" style="margin-top:0.75rem">
                    <div class="form-group">
                        <label for="dateFrom">From</label>
                        <input type="date" id="dateFrom" required>
                    </div>
                    <div class="form-group">
                        <label for="dateTo">To</label>
                        <input type="date" id="dateTo" required>
                    </div>
                    <div class="form-group">
                        <label for="maxPages">Pages</label>
                        <select id="maxPages">
                            <option value="1">1 (50 videos)</option>
                            <option value="2">2 (100 videos)</option>
                            <option value="3">3 (150 videos)</option>
                            <option value="5">5 (250 videos)</option>
                            <option value="10">10 (500 videos)</option>
                        </select>
                    </div>
                    <div class="form-group form-group-btn">
                        <button type="button" id="searchBtn" onclick="submitSearch()">Find Top Videos</button>
                    </div>
                </div>
                <!-- Honeypot -->
                <input type="text" name="website" id="website" style="position:absolute;left:-9999px" tabindex="-1" autocomplete="off">

                <div class="quick-dates">
                    <button type="button" onclick="setQuickDate('thisMonth')">This Month</button>
                    <button type="button" onclick="setQuickDate('lastMonth')">Last Month</button>
                    <button type="button" onclick="setQuickDate('thisYear')">This Year</button>
                    <button type="button" onclick="setQuickDate('lastYear')">Last Year</button>
                </div>
            </form>

            <div class="quota-bar">
                <span id="quotaInfo">Loading quota...</span>
            </div>
        </section>

        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <div id="loading" class="loading" style="display:none">Searching...</div>

        <section id="resultsSection" style="display:none">
            <div class="results-header">
                <span id="resultsSummary"></span>
                <button type="button" id="exportBtn" onclick="downloadCSV()">Download CSV</button>
            </div>
            <div class="filter-row">
                <input type="text" id="tableFilter" placeholder="Filter results..." oninput="filterTable()">
                <span id="filterCount"></span>
            </div>
            <div class="table-wrap">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Thumbnail</th>
                            <th class="sortable" data-key="title" onclick="sortBy('title')">Title <span class="sort-arrow"></span></th>
                            <th class="sortable" data-key="channel_title" onclick="sortBy('channel_title')">Channel <span class="sort-arrow"></span></th>
                            <th class="sortable" data-key="view_count" onclick="sortBy('view_count')">Views <span class="sort-arrow sort-active-desc">&#9660;</span></th>
                            <th class="sortable" data-key="like_count" onclick="sortBy('like_count')">Likes <span class="sort-arrow"></span></th>
                            <th class="sortable" data-key="comment_count" onclick="sortBy('comment_count')">Comments <span class="sort-arrow"></span></th>
                            <th class="sortable" data-key="duration_seconds" onclick="sortBy('duration_seconds')">Duration <span class="sort-arrow"></span></th>
                            <th class="sortable" data-key="publish_date" onclick="sortBy('publish_date')">Published <span class="sort-arrow"></span></th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </section>

        <section class="history-section">
            <button type="button" class="toggle-btn" onclick="toggleHistory()">Search History</button>
            <div id="historyList" style="display:none"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
